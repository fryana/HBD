<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(ellipse at center,#1a0a2e 0%,#0d0820 60%,#050310 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;font-family:'Comic Sans MS',cursive;
}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,2s) infinite alternate}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}

#scene{position:relative;width:420px;height:560px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;z-index:1}

/* ── CAKE ── */
#cake{position:relative;display:flex;flex-direction:column;align-items:center}
.tier{position:relative;border-radius:12px;display:flex;align-items:center;justify-content:center}
.tier-top{
  width:200px;height:80px;
  background:linear-gradient(180deg,#c084fc,#9333ea);
  border:3px solid #7c3aed;
  box-shadow:0 6px 18px rgba(0,0,0,.5),inset 3px 0 8px rgba(255,255,255,.15);
  margin-bottom:-3px;z-index:2;
}
.tier-bot{
  width:290px;height:105px;
  background:linear-gradient(180deg,#ff85a1,#e8528c);
  border:3px solid #c23579;
  box-shadow:0 8px 22px rgba(0,0,0,.5),inset 3px 0 8px rgba(255,255,255,.15);
  z-index:1;
}
/* frosting drips */
.drip{position:absolute;top:-12px;left:0;right:0;height:16px;background:#fff8fa;border-radius:8px 8px 0 0;z-index:3}
.drip::after{
  content:'';position:absolute;bottom:-10px;
  background:#fff8fa;
  width:100%;height:12px;
  border-radius:0;
  box-shadow:
    -80px 0 0 -2px #fff8fa,-80px 6px 0 -4px #fff8fa,
    -50px 0 0 -2px #fff8fa,-50px 9px 0 -4px #fff8fa,
    -20px 0 0 -2px #fff8fa,-20px 7px 0 -4px #fff8fa,
    10px 0 0 -2px #fff8fa, 10px 8px 0 -4px #fff8fa,
    40px 0 0 -2px #fff8fa, 40px 6px 0 -4px #fff8fa,
    70px 0 0 -2px #fff8fa, 70px 9px 0 -4px #fff8fa;
}
.cake-dots{position:absolute;display:flex;gap:14px;bottom:18px}
.dot{width:13px;height:13px;border-radius:50%;box-shadow:0 0 7px currentColor}

/* ── CANDLES ── */
#candles{position:absolute;top:-165px;display:flex;gap:28px;align-items:flex-end;z-index:10}
.candle{position:relative;display:flex;flex-direction:column;align-items:center}
.wick{width:3px;height:14px;background:#2a2a2a;border-radius:2px;z-index:5}
.cbody{
  width:52px;height:95px;
  background:linear-gradient(90deg,rgba(255,255,255,.25) 0%,transparent 30%,transparent 70%,rgba(0,0,0,.1) 100%),
             linear-gradient(180deg,#ffe066,#ffa500,#ffe066);
  border:3px solid #e07800;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:46px;font-weight:900;color:#8b2000;
  font-family:Georgia,serif;
  text-shadow:2px 2px 3px rgba(0,0,0,.3);
  box-shadow:4px 4px 12px rgba(0,0,0,.4),inset 3px 0 8px rgba(255,255,255,.3);
}

/* ── FLAMES ── */
.flame-wrap{position:absolute;top:-56px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;transition:opacity .3s,transform .3s}
.flame{position:relative;width:28px;height:46px}
.flame-outer{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:26px;height:44px;
  background:radial-gradient(ellipse at 50% 90%,#fff700 0%,#ff8c00 55%,#ff2200 85%,transparent 100%);
  border-radius:50% 50% 35% 35%/60% 60% 40% 40%;
  animation:flicker .25s ease-in-out infinite alternate;
  transform-origin:50% 100%;
}
.flame-inner{
  position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:14px;height:26px;
  background:radial-gradient(ellipse at 50% 90%,#ffffff 0%,#fff700 100%);
  border-radius:50% 50% 35% 35%/60% 60% 40% 40%;
}
.flame-glow{
  position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  width:48px;height:48px;
  background:radial-gradient(ellipse,rgba(255,180,0,.5) 0%,transparent 70%);
  border-radius:50%;
  animation:glow .4s ease-in-out infinite alternate;
}
@keyframes flicker{
  0%{transform:translateX(-50%) scaleX(1) scaleY(1) rotate(-3deg)}
  33%{transform:translateX(-50%) scaleX(.85) scaleY(1.08) rotate(3deg)}
  66%{transform:translateX(-50%) scaleX(1.1) scaleY(.94) rotate(-2deg)}
  100%{transform:translateX(-50%) scaleX(.95) scaleY(1.06) rotate(2deg)}
}
@keyframes glow{from{opacity:.5;transform:translateX(-50%) scale(1)}to{opacity:.9;transform:translateX(-50%) scale(1.3)}}

/* flame blow-out */
.flame-wrap.blowout{animation:blowout .4s ease-out forwards}
@keyframes blowout{
  0%{opacity:1;transform:translateX(-50%)}
  40%{transform:translateX(-50%) translateX(30px) scaleY(.3)}
  100%{opacity:0;transform:translateX(-50%) translateX(60px) scaleY(0)}
}

/* smoke */
.smoke-puff{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(200,200,200,.8),rgba(150,150,150,0));
  animation:smoke-up 2s ease-out forwards;
  pointer-events:none;
}
@keyframes smoke-up{
  0%{transform:translate(0,0) scale(.5);opacity:.8}
  100%{transform:translate(calc(var(--sx)*1px),-90px) scale(2.5);opacity:0}
}

/* ── WIND ── */
#wind{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;display:none;overflow:hidden}
.wl{
  position:absolute;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7) 40%,rgba(200,230,255,.5),transparent);
  border-radius:2px;animation:wblow var(--wd,.7s) ease-in-out forwards
}
@keyframes wblow{
  0%{left:-300px;opacity:0}15%{opacity:1}85%{opacity:.8}100%{left:110%;opacity:0}
}

/* ── CRUMBLE pieces ── */
.crumb{
  position:absolute;border-radius:4px;pointer-events:none;
  animation:crumble 1.4s cubic-bezier(.25,1,.5,1) forwards
}
@keyframes crumble{
  0%{transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(var(--cx),var(--cy)) rotate(var(--cr));opacity:0}
}

/* ── STITCH ── */
#stitch{
  position:absolute;bottom:8px;opacity:0;
  transform:scale(0) translateY(60px);
  transition:opacity .7s,transform .7s cubic-bezier(.34,1.56,.64,1);
  z-index:20;filter:drop-shadow(0 15px 25px rgba(0,100,200,.4));
}
#stitch.show{opacity:1;transform:scale(1) translateY(0)}

/* SVG eyelid animation */
.eyelid{transition:height .08s ease}
@keyframes auto-blink{
  0%,92%,100%{height:0px}
  96%{height:50px}
}
.lid-anim{animation:auto-blink 3.5s infinite}
.lid-anim-delayed{animation:auto-blink 3.5s .15s infinite}

/* ── HAPPY BIRTHDAY ── */
#hbd{
  position:absolute;top:10px;width:100%;text-align:center;
  font-size:38px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b9d,#ffd93d);
  background-size:300%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  opacity:0;transform:scale(.2) rotate(-15deg);
  transition:opacity .8s,transform .8s cubic-bezier(.34,1.56,.64,1);
  animation:hbdgrad 4s linear infinite;
  filter:drop-shadow(0 0 12px rgba(255,150,50,.6));
  z-index:30;
}
#hbd.show{opacity:1;transform:scale(1) rotate(0deg)}
@keyframes hbdgrad{0%{background-position:0%}100%{background-position:300%}}

/* ── CONFETTI ── */
.cf{
  position:fixed;top:-15px;border-radius:2px;pointer-events:none;z-index:100;
  animation:cfall var(--cd,3s) linear forwards
}
@keyframes cfall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(calc(var(--cr2)*1deg));opacity:.2}
}
</style>
</head>
<body>
<div id="stars"></div>
<div id="wind"></div>

<div id="scene">
  <div id="hbd">Happy Birthday! 🎂</div>

  <div id="stitch">
    <svg id="stitch-svg" width="240" height="270" viewBox="0 0 240 270" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#7ec8f0"/>
          <stop offset="60%" stop-color="#5ba8dc"/>
          <stop offset="100%" stop-color="#3a80b8"/>
        </radialGradient>
        <radialGradient id="bellyGrad" cx="50%" cy="40%">
          <stop offset="0%" stop-color="#a8d8f0"/>
          <stop offset="100%" stop-color="#7ec8f0"/>
        </radialGradient>
        <!-- Left eye clip -->
        <clipPath id="lec">
          <rect id="lLid" x="62" y="64" width="50" height="0"/>
        </clipPath>
        <!-- Right eye clip -->
        <clipPath id="rec">
          <rect id="rLid" x="128" y="64" width="50" height="0"/>
        </clipPath>
      </defs>

      <!-- LEFT EAR -->
      <path d="M 72 82 C 55 60, 28 25, 42 8 C 52 -2, 78 8, 82 42 Z" fill="url(#bodyGrad)"/>
      <path d="M 72 82 C 58 64, 40 35, 50 18 C 57 8, 74 16, 76 46 Z" fill="#d4a0c0" opacity=".85"/>
      <!-- RIGHT EAR -->
      <path d="M 168 82 C 185 60, 212 25, 198 8 C 188 -2, 162 8, 158 42 Z" fill="url(#bodyGrad)"/>
      <path d="M 168 82 C 182 64, 200 35, 190 18 C 183 8, 166 16, 164 46 Z" fill="#d4a0c0" opacity=".85"/>

      <!-- BODY -->
      <ellipse cx="120" cy="210" rx="72" ry="65" fill="url(#bodyGrad)"/>
      <!-- belly -->
      <ellipse cx="120" cy="215" rx="42" ry="42" fill="url(#bellyGrad)" opacity=".55"/>

      <!-- HEAD -->
      <ellipse cx="120" cy="102" rx="72" ry="67" fill="url(#bodyGrad)"/>

      <!-- HEAD fur texture dots -->
      <circle cx="85" cy="52" r="3" fill="#4a92c4" opacity=".4"/>
      <circle cx="120" cy="40" r="3.5" fill="#4a92c4" opacity=".4"/>
      <circle cx="155" cy="52" r="3" fill="#4a92c4" opacity=".4"/>

      <!-- EYE WHITES -->
      <ellipse cx="93" cy="98" rx="26" ry="28" fill="white"/>
      <ellipse cx="147" cy="98" rx="26" ry="28" fill="white"/>

      <!-- IRISES -->
      <ellipse cx="96" cy="103" rx="17" ry="19" fill="#1a3f7a"/>
      <ellipse cx="150" cy="103" rx="17" ry="19" fill="#1a3f7a"/>

      <!-- PUPILS -->
      <ellipse cx="98" cy="106" rx="10" ry="11" fill="#050a16"/>
      <ellipse cx="152" cy="106" rx="10" ry="11" fill="#050a16"/>

      <!-- EYE SHINE highlights -->
      <circle cx="86" cy="91" r="6" fill="white" opacity=".92"/>
      <circle cx="140" cy="91" r="6" fill="white" opacity=".92"/>
      <circle cx="92" cy="99" r="2.5" fill="white" opacity=".6"/>
      <circle cx="146" cy="99" r="2.5" fill="white" opacity=".6"/>

      <!-- EYELID overlays (animated via JS) -->
      <ellipse cx="93" cy="98" rx="26" ry="28" fill="url(#bodyGrad)" clip-path="url(#lec)"/>
      <ellipse cx="147" cy="98" rx="26" ry="28" fill="url(#bodyGrad)" clip-path="url(#rec)"/>

      <!-- NOSE -->
      <ellipse cx="120" cy="124" rx="16" ry="11" fill="#080818" transform="rotate(-5,120,124)"/>
      <ellipse cx="117" cy="121" rx="6" ry="4" fill="#1a1a30" opacity=".7"/>
      <!-- nose highlight -->
      <ellipse cx="113" cy="119" rx="4" ry="2.5" fill="#2e2e50" opacity=".5"/>

      <!-- SMILE -->
      <path d="M 96 138 Q 120 158 144 138" stroke="#080818" stroke-width="3.5" fill="none" stroke-linecap="round"/>

      <!-- TEETH -->
      <rect x="104" y="139" width="9" height="10" rx="2" fill="white"/>
      <rect x="115" y="140" width="10" height="11" rx="2" fill="white"/>
      <rect x="127" y="139" width="9" height="10" rx="2" fill="white"/>

      <!-- CHEEK blushes -->
      <ellipse cx="64" cy="118" rx="14" ry="9" fill="#f0a0c0" opacity=".4"/>
      <ellipse cx="176" cy="118" rx="14" ry="9" fill="#f0a0c0" opacity=".4"/>

      <!-- ARMS -->
      <ellipse cx="50" cy="192" rx="22" ry="42" fill="url(#bodyGrad)" transform="rotate(-18,50,192)"/>
      <ellipse cx="190" cy="192" rx="22" ry="42" fill="url(#bodyGrad)" transform="rotate(18,190,192)"/>

      <!-- CLAWS left arm -->
      <ellipse cx="32" cy="224" rx="11" ry="8" fill="#4a90c0" transform="rotate(-30,32,224)"/>
      <ellipse cx="43" cy="232" rx="11" ry="8" fill="#4a90c0" transform="rotate(-10,43,232)"/>
      <ellipse cx="56" cy="234" rx="11" ry="8" fill="#4a90c0" transform="rotate(10,56,234)"/>
      <!-- CLAWS right arm -->
      <ellipse cx="208" cy="224" rx="11" ry="8" fill="#4a90c0" transform="rotate(30,208,224)"/>
      <ellipse cx="197" cy="232" rx="11" ry="8" fill="#4a90c0" transform="rotate(10,197,232)"/>
      <ellipse cx="184" cy="234" rx="11" ry="8" fill="#4a90c0" transform="rotate(-10,184,234)"/>

      <!-- BACK SPINES (head top) -->
      <ellipse cx="100" cy="44" rx="7" ry="20" fill="#4a90c0" transform="rotate(-22,100,44)"/>
      <ellipse cx="120" cy="37" rx="7" ry="22" fill="#4a90c0"/>
      <ellipse cx="140" cy="44" rx="7" ry="20" fill="#4a90c0" transform="rotate(22,140,44)"/>

      <!-- LEGS/FEET -->
      <ellipse cx="93" cy="260" rx="26" ry="16" fill="url(#bodyGrad)"/>
      <ellipse cx="147" cy="260" rx="26" ry="16" fill="url(#bodyGrad)"/>
      <!-- toe claws left -->
      <circle cx="74" cy="263" r="7" fill="#4a90c0"/>
      <circle cx="88" cy="268" r="7" fill="#4a90c0"/>
      <circle cx="103" cy="265" r="7" fill="#4a90c0"/>
      <!-- toe claws right -->
      <circle cx="132" cy="265" r="7" fill="#4a90c0"/>
      <circle cx="147" cy="268" r="7" fill="#4a90c0"/>
      <circle cx="162" cy="263" r="7" fill="#4a90c0"/>
    </svg>
  </div>

  <div id="cake">
    <div id="candles">
      <div class="candle" id="c2">
        <div class="flame-wrap" id="fw2">
          <div class="flame">
            <div class="flame-glow"></div>
            <div class="flame-outer"></div>
            <div class="flame-inner"></div>
          </div>
        </div>
        <div class="wick"></div>
        <div class="cbody">2</div>
      </div>
      <div class="candle" id="c4">
        <div class="flame-wrap" id="fw4">
          <div class="flame">
            <div class="flame-glow"></div>
            <div class="flame-outer"></div>
            <div class="flame-inner"></div>
          </div>
        </div>
        <div class="wick"></div>
        <div class="cbody">4</div>
      </div>
    </div>
    <div class="tier tier-top">
      <div class="drip"></div>
      <div class="cake-dots">
        <div class="dot" style="color:#ff6b6b;background:#ff6b6b"></div>
        <div class="dot" style="color:#ffd93d;background:#ffd93d"></div>
        <div class="dot" style="color:#6bcb77;background:#6bcb77"></div>
      </div>
    </div>
    <div class="tier tier-bot">
      <div class="drip"></div>
      <div class="cake-dots">
        <div class="dot" style="color:#ffd700;background:#ffd700"></div>
        <div class="dot" style="color:#ff85a1;background:#ff85a1"></div>
        <div class="dot" style="color:#c084fc;background:#c084fc"></div>
        <div class="dot" style="color:#ff85a1;background:#ff85a1"></div>
        <div class="dot" style="color:#ffd700;background:#ffd700"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<90;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*3+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*2+.8).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
  starsEl.appendChild(s);
}

// ── Wind ──
function doWind(){
  const w=document.getElementById('wind');
  w.style.display='block';
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const l=document.createElement('div');
      l.className='wl';
      const wd=(Math.random()*.5+.5).toFixed(2);
      l.style.cssText=`width:${Math.random()*200+80}px;top:${Math.random()*75+8}%;--wd:${wd}s`;
      w.appendChild(l);
      setTimeout(()=>l.remove(),900);
    },i*65);
  }
}

// ── Blow candles ──
function blowCandles(){
  ['fw2','fw4'].forEach((id,i)=>{
    setTimeout(()=>{
      const fw=document.getElementById(id);
      fw.classList.add('blowout');
      // smoke puffs
      const candle=fw.parentElement;
      for(let j=0;j<5;j++){
        setTimeout(()=>{
          const p=document.createElement('div');
          p.className='smoke-puff';
          const sz=Math.random()*16+10;
          const sx=(Math.random()*40-20).toFixed(0);
          p.style.cssText=`width:${sz}px;height:${sz}px;left:${18+Math.random()*14}px;top:${-10-j*8}px;animation-delay:${j*.12}s;--sx:${sx}`;
          candle.appendChild(p);
          setTimeout(()=>p.remove(),2200);
        },j*80+100);
      }
    },i*300);
  });
}

// ── Crumble cake ──
function crumbleCake(){
  const cake=document.getElementById('cake');
  const colors=['#ff85a1','#e8528c','#c084fc','#9333ea','#ffe066','#ffa500','#fff8fa','#ff6b6b'];
  for(let i=0;i<35;i++){
    const c=document.createElement('div');
    c.className='crumb';
    const sz=Math.random()*30+8;
    const cx=((Math.random()-.5)*500).toFixed(0);
    const cy=(Math.random()*350+80).toFixed(0);
    const cr=((Math.random()-.5)*900).toFixed(0);
    c.style.cssText=`width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};`+
      `left:${Math.random()*270}px;top:${Math.random()*200}px;`+
      `--cx:${cx}px;--cy:${cy}px;--cr:${cr}deg;animation-duration:${(Math.random()*.5+1).toFixed(2)}s`;
    cake.appendChild(c);
  }
  setTimeout(()=>{
    document.querySelectorAll('.tier,.tier-top,.tier-bot,#candles').forEach(el=>{
      el.style.transition='opacity .7s,transform .7s';
      el.style.opacity='0';
      el.style.transform='scale(.4) translateY(40px)';
    });
  },200);
  setTimeout(()=>cake.style.display='none',900);
}

// ── Stitch blink ──
function startBlink(){
  const lLid=document.getElementById('lLid');
  const rLid=document.getElementById('rLid');
  function blink(){
    // close
    lLid.setAttribute('height','56');
    rLid.setAttribute('height','56');
    setTimeout(()=>{lLid.setAttribute('height','0');rLid.setAttribute('height','0')},130);
  }
  // initial blinks
  blink();
  setTimeout(blink,500);
  setTimeout(blink,1050);
  // then automatic random blinking
  function autoBlink(){
    blink();
    setTimeout(autoBlink,Math.random()*2500+1500);
  }
  setTimeout(autoBlink,2000);
}

// ── Confetti ──
function confetti(){
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6b9d','#c084fc','#ffa500','#00e5ff'];
  for(let i=0;i<70;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='cf';
      const sz=Math.random()*10+5;
      const cd=(Math.random()*2.5+2).toFixed(1);
      const cr2=Math.floor(Math.random()*1440-720);
      p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;`+
        `background:${cols[Math.floor(Math.random()*cols.length)]};`+
        `border-radius:${Math.random()>.4?'50%':'3px'};`+
        `--cd:${cd}s;--cr2:${cr2};animation-delay:${(Math.random()*2).toFixed(1)}s`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),(parseFloat(cd)+2)*1000);
    },i*40);
  }
}

// ── Timeline ──
setTimeout(doWind,          3000);
setTimeout(blowCandles,     4500);
setTimeout(crumbleCake,     5800);
setTimeout(()=>{
  document.getElementById('stitch').classList.add('show');
  setTimeout(startBlink,600);
},                          7200);
setTimeout(()=>document.getElementById('hbd').classList.add('show'), 8700);
setTimeout(confetti,        9200);
</script>
</body>
</html>
